watch_stylesheet: true
watch_config: true
debug: false
update_check: true
bars:
  status-bar:
    enabled: true
    screens: ["primary"]
    class_name: "yasb-bar"
    alignment:
      position: "top"
      align: "center"
    animation:
      enabled: true
      duration: 1000
    blur_effect:
      enabled: true
      acrylic: true
      dark_mode: true
      round_corners: true
      border_color: "None"
    window_flags:
      always_on_top: false
      windows_app_bar: true


      hide_on_maximized: true
      hide_on_fullscreen: true
      auto_hide: false
    dimensions:
      width: "100%"
      height: 46
    layouts:
      center:
        alignment: "center"
        stretch: false
    padding:
      top: 3
      left: 8
      bottom: 3
      right: 8
    widgets:
      left:
      - left-island
      center:
      - media
      right:
      - right-island
  secondary-time-bar:
    enabled: true
    screens: ["AF24H1"]
    class_name: "yasb-bar"
    alignment:
      position: "top"
      align: "center"
    animation:
      enabled: true
      duration: 1000
    blur_effect:
      enabled: true
      acrylic: true
      dark_mode: true
      round_corners: true
      border_color: "None"
    window_flags:
      always_on_top: false
      windows_app_bar: true
      hide_on_maximized: false
      hide_on_fullscreen: true
      auto_hide: false
    dimensions:
      width: "100%"
      height: 46
    layouts:
      center:
        alignment: "center"
        stretch: false
      right:
        alignment: "right"
        stretch: false
    padding:
      top: 3
      left: 8
      bottom: 3
      right: 8
    widgets:
      center:
      - second-clock
      right:
      - game_mode
widgets:
  second-clock:
    type: "yasb.clock.ClockWidget"
    options:
      label: "<span></span> {%H:%M}"
      tooltip: false
      timezones: []
      calendar:
        blur: true
        round_corners: true
        alignment: "center"
        direction: "down"
        show_week_numbers: true
      callbacks:
        on_left: "toggle_calendar"
        on_middle: "do_nothing"
        on_right: "do_nothing"
  language:
    type: "yasb.language.LanguageWidget"
    options:
      label: "{lang[language_code]}"
      label_alt: "{lang[full_name]}"
      update_interval: 1
      callbacks:
        on_left: "toggle_menu"
        on_middle: "do_nothing"
        on_right: "toggle_label"
      language_menu:
        blur: true
        round_corners: true
        round_corners_type: "normal"
        border_color: "system"
        alignment: "right"
        direction: "down"
        offset_top: 6
        offset_left: 0
        show_layout_icon: true
        layout_icon: "⌨"

  games:
    type: "yasb.launchpad.LaunchpadWidget"
    options:
      label: "🎮"
      search_placeholder: "Поиск игр..."
      app_icon_size: 56
      window:
        fullscreen: false
        width: 900
        height: 650
        overlay_block: true
      window_style:
        enable_blur: true
        round_corners: true
        round_corners_type: "normal"
        border_color: "system"
      window_animation:
        fade_in_duration: 120
        fade_out_duration: 100
      group_apps: true
      callbacks:
        on_left: "toggle_launchpad"
        on_middle: "do_nothing"
        on_right: "do_nothing"
      keybindings:
        - keys: "alt+g"
          action: "toggle_launchpad"
          screen: "cursor"
  left-island:
    type: yasb.grouper.GrouperWidget
    options:
      class_name: left-island
      widgets:
      - home
      - taskbar
      - clock
      - volume
      collapse_options:
        enabled: false
  vpn_status:
    type: "yasb.custom.CustomWidget"
    options:
      class_name: "vpn-status-widget"
      label: "\uf132"
      label_alt: "\uf132"
      label_placeholder: "\uf132"
      tooltip: true
      tooltip_label: "{data[text]}"
      exec_options:
        run_cmd: "powershell.exe -NoProfile -ExecutionPolicy Bypass -File C:\\Users\\Tranquil\\.config\\yasb\\vpn-status.ps1"
        run_interval: 1000
        return_format: "json"
        hide_empty: false
      callbacks:
        on_left: "exec C:\\Users\\Tranquil\\.config\\yasb\\open-clash.cmd"
        on_middle: "do_nothing"
        on_right: "do_nothing"

  right-island:
    type: yasb.grouper.GrouperWidget
    options:
      class_name: right-island
      widgets:
      - cpu
      - memory
      - gpu
      - vpn_status
      - notifications
      - power_menu
      - language
      collapse_options:
        enabled: false
  home:
    type: "yasb.home.HomeWidget"
    options:
      blur: true
      round_corners: true
      label: "<span></span>"
      menu_list:
      - {title: "<span style='font-family: \"JetBrainsMono NFP\";'>&#xf015; </span>Home", path: "~"}
      - {title: "<span style='font-family: \"JetBrainsMono NFP\";'>&#xf108; </span>Desktop", command: "explorer", args: [
          "%USERPROFILE%\\OneDrive\\Desktop"], shell: true}
      - {title: "<span style='font-family: \"JetBrainsMono NFP\";'>&#xf019; </span>Downloads", command: "explorer", args: [
          "%USERPROFILE%\\Downloads"], shell: true}
      - {title: "<span style='font-family: \"JetBrainsMono NFP\";'>&#xf07c; </span>Documents", command: "explorer", args: [
          "%USERPROFILE%\\OneDrive\\Documents"], shell: true}
      - {title: "<span style='font-family: \"JetBrainsMono NFP\";'>&#xf03e; </span>Pictures", command: "explorer", args: [
          "%USERPROFILE%\\OneDrive\\Pictures"], shell: true}
      - {title: "<span style='font-family: \"JetBrainsMono NFP\";'>&#xf03d; </span>Videos", command: "explorer", args: ["%USERPROFILE%\\\
            OneDrive\\Videos"], shell: true}
      - {title: "<span style='font-family: \"JetBrainsMono NFP\";'>&#xf001; </span>Music", command: "explorer", args: ["%USERPROFILE%\\\
            OneDrive\\Music"], shell: true}
      - {title: "<span style='font-family: \"JetBrainsMono NFP\";'>&#xf023; </span>AppData", command: "explorer", args: [
          "%APPDATA%"], shell: true}
      - {title: "<span style='font-family: \"JetBrainsMono NFP\";'>&#xf1f8; </span>Recycle Bin", command: "explorer", 
          args: ["shell:RecycleBinFolder"], shell: true}
      - {title: "<span style='font-family: \"JetBrainsMono NFP\";'>&#xf013; </span>Settings", command: "start", args: ["ms-settings:"],
        shell: true}
      - {title: "<span style='font-family: \"JetBrainsMono NFP\";'>&#xf0ad; </span>Control Panel", command: "control", 
          args: [""], shell: true}
      - {title: "<span style='font-family: \"JetBrainsMono NFP\";'>&#xf437; </span>Task Manager", command: "taskmgr", 
          args: [""], shell: true}
      - {title: "<span style='font-family: \"JetBrainsMono NFP\";'>&#xf05a; </span>About", command: "winver", args: [""],
        shell: true}
      system_menu: false
      power_menu: false
      alignment: "left"
      direction: "down"
  clock:
    type: "yasb.clock.ClockWidget"
    options:
      label: "<span></span>{%a. %B %d, %H:%M %p}"
      tooltip: false
      timezones: []
      calendar:
        blur: true
        round_corners: true
        alignment: "left"
        direction: "down"
        show_week_numbers: true
      callbacks:
        on_left: "toggle_calendar"
        on_middle: "do_nothing"
        on_right: "do_nothing"
  volume:
    type: "yasb.volume.VolumeWidget"
    options:
      label: "<span>{icon}</span>{level}"
      tooltip: false
      mute_text: "Muted"
      icons:
      - ""
      - ""
      - ""
      - ""
      - ""
      audio_menu:
        blur: true
        round_corners: true
        alignment: "left"
        direction: "down"
        show_apps: true
        show_apps_expanded: true
      callbacks:
        on_left: "toggle_volume_menu"
        on_middle: "do_nothing"
        on_right: "toggle_mute"
  glazewm_workspaces:
    type: "glazewm.workspaces.GlazewmWorkspacesWidget"
    options:
      offline_label: "GlazeWM"
      hide_if_offline: false
      enable_scroll_switching: true
  taskbar:
    type: "yasb.taskbar.TaskbarWidget"
    options:
      icon_size: 24
      tooltip: false
      show_only_visible: false
      strict_filtering: false
      monitor_exclusive: false
      hide_empty: false
      animation:
        enabled: true
        duration: 180
      preview:
        enabled: true
        width: 280
        delay: 350
        padding: 8
        margin: 8
      title_label:
        enabled: false
      callbacks:
        on_left: "toggle_window"
        on_middle: "close_app"
        on_right: "context_menu"
      ignore_apps:
        processes:
        - "yasb"
        titles: []
        classes: []
  active_window:
    type: "yasb.active_window.ActiveWindowWidget"
    options:
      label: "{win[app_name]}"
      label_no_window: ""
      label_icon: true
      label_icon_size: 16
      max_length: 56
      max_length_ellipsis: "..."
      monitor_exclusive: true
      callbacks:
        on_left: "do_nothing"
        on_middle: "do_nothing"
        on_right: "do_nothing"
  media:
    type: "yasb.media.MediaWidget"
    options:
      label: "{title}{s}{artist}"
      label_alt: "{artist}{s}{title}"
      separator: "  •  "

      # Полностью скрывать плеер, когда Windows не отдаёт медиасессию.
      hide_empty: true

      # Плеер с обложкой, текстом и кнопками.
      controls_only: false
      controls_left: false
      controls_hide: false

      show_thumbnail: true
      thumbnail_alpha: 100
      thumbnail_padding: 0
      thumbnail_corner_radius: 8
      symmetric_corner_radius: true
      thumbnail_edge_fade: true

      max_field_size:
        label: 34
        label_alt: 34
        truncate_whole_label: false

      icons:
        prev_track: "\uf048"
        next_track: "\uf051"
        play: "\uf04b"
        pause: "\uf04c"

      scrolling_label:
        enabled: true
        update_interval_ms: 45
        style: "bounce-ease"
        separator: "      "
        label_padding: 1
        always_scroll: false
        ease_slope: 20
        ease_pos: 0.8
        ease_min: 0.5

      progress_bar:
        enabled: true
        alignment: "bottom"

      media_menu:
        blur: true
        round_corners: true
        round_corners_type: "normal"
        border_color: "None"
        alignment: "center"
        direction: "down"
        offset_top: 6
        offset_left: 0
        thumbnail_corner_radius: 10
        thumbnail_size: 180
        max_title_size: 70
        max_artist_size: 40
        show_source: true
        show_volume_slider: false

      media_menu_icons:
        play: "\uf04b"
        pause: "\uf04c"
        prev_track: "\uf048"
        next_track: "\uf051"
        mute: "\uf6a9"
        unmute: "\uf028"

      callbacks:
        on_left: "toggle_media_menu"
        on_middle: "toggle_play_pause"
        on_right: "open_media_source"
  hardware-grouper:
    type: "yasb.grouper.GrouperWidget"
    options:
      class_name: "hardware-grouper"
      widgets: ["cpu", "memory", "gpu"]
      collapse_options:
        enabled: true
        expanded_label: ""
        collapsed_label: ""
        label_position: "right"
  cpu:
    type: "yasb.cpu.CpuWidget"
    options:
      label: "<span></span>CPU: {info[percent][total]}%"
      label_alt: "<span></span> {info[percent][total]}%"
      update_interval: 5000
      hide_decimal: true
      callbacks:
        on_left: "do_nothing"
        on_middle: "do_nothing"
        on_right: "do_nothing"
  memory:
    type: "yasb.memory.MemoryWidget"
    options:
      label: "<span></span>RAM: {virtual_mem_percent}%"
      label_alt: "<span></span> {virtual_mem_percent}%"
      update_interval: 5000
      hide_decimal: true
      callbacks:
        on_left: "do_nothing"
        on_middle: "do_nothing"
        on_right: "do_nothing"
  gpu:
    type: "yasb.gpu.GpuWidget"
    options:
      label: "<span></span>GPU: {info[utilization]}%"
      label_alt: "<span></span> {info[utilization]}%"
      update_interval: 5000
      hide_decimal: true
      callbacks:
        on_left: "do_nothing"
        on_middle: "do_nothing"
        on_right: "do_nothing"
  glazewm_tiling_direction:
    type: "glazewm.tiling_direction.GlazewmTilingDirectionWidget"
    options:
      horizontal_label: "\uDB81\uDCE1"
      vertical_label: "\uDB81\uDCE2"
  glazewm_binding_mode:
    type: "glazewm.binding_mode.GlazewmBindingModeWidget"
    options:
      label: "<span>{icon}</span>"
      hide_if_no_active: false
      default_icon: ""
      icons:
        none: ""
        resize: ""
        pause: ""
      binding_modes_to_cycle_through: ["none", "resize", "pause"]
      callbacks:
        on_left: "next_binding_mode"
        on_middle: "do_nothing"
        on_right: "disable_binding_mode"
  wallpapers:
    type: "yasb.wallpapers.WallpapersWidget"
    options:
      label: "<span></span>"
      image_path: "C:\\Wallpapers"
      tooltip: false
      gallery:
        enabled: true
        blur: true
        image_width: 480
        image_per_page: 3
        orientation: "landscape"
        show_buttons: true
        image_spacing: 24
        lazy_load: true
        lazy_load_fadein: 1000
        image_corner_radius: 4
      callbacks:
        on_left: "toggle_gallery"
        on_middle: "do_nothing"
        on_right: "do_nothing"
  notifications:
    type: "yasb.notifications.NotificationsWidget"
    options:
      label: "<span>{icon}</span>"
      hide_empty: false
      tooltip: false
      icons:
        new: ""
        default: ""
      callbacks:
        on_left: "toggle_notification"
        on_right: "do_nothing"
        on_middle: "do_nothing"
  power_menu:
    type: "yasb.power_menu.PowerMenuWidget"
    options:
      label: "<span></span>"
      uptime: true
      show_user: true
      profile_image_size: 128
      blur: true
      blur_background: true
      button_row: 6
      menu_style: "fullscreen"
      buttons:
        signout: ["", "Sign Out"]
        shutdown: ["", "Shut Down"]
        restart: ["", "Restart"]
        hibernate: ["", "Hibernate"]
        sleep: ["\uDB82\uDD04", "Sleep"]
        lock: ["", "Lock"]
        cancel: ["\uDB81\uDF3A", "Cancel"]
  # HYPR GAME MODE WIDGET START
  # HYPR GAME MODE WIDGET START
  game_mode:
    type: "yasb.applications.ApplicationsWidget"
    options:
      class_name: "game-mode-widget"
      label: "{data}"
      tooltip: true
      app_list:
        - icon: "\uf11b"
          launch: 'wscript.exe C:\Users\Tranquil\.config\yasb\scripts\game-mode-toggle.vbs'
          name: "Game mode: disable GlazeWM Alt hotkeys"
  # HYPR GAME MODE WIDGET END
